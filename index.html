<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yer Altı Tarama Kontrol Paneli</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .status { display: inline-block; padding: 5px 10px; border-radius: 4px; font-weight: bold; }
        .connected { background: #2e7d32; color: #fff; }
        .disconnected { background: #c62828; color: #fff; }
        button { background: #1976d2; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 16px; margin-right: 10px; }
        button:disabled { background: #444; cursor: not-allowed; }
        input, select { background: #2d2d2d; color: #fff; border: 1px solid #444; padding: 8px; border-radius: 4px; margin-right: 10px; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-top: 20px; max-width: 300px; }
        .cell { aspect-ratio: 1; background: #333; border-radius: 4px; transition: background 0.3s; }
        .seans-item { background: #2d2d2d; padding: 10px; margin-top: 10px; border-radius: 4px; border-left: 4px solid #1976d2; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Yer Altı Görüntüleme & Seans Yönetimi</h2>
        
        <!-- Cihaz Bağlantı Kartı -->
        <div class="card">
            <h3>1. Cihaz Bağlantısı</h3>
            <div style="margin-bottom: 15px;">
                Durum: <span id="statusBadge" class="status disconnected">Bağlı Değil</span>
            </div>
            <button id="btnConnect">Bluetooth ile Makinaya Bağlan</button>
            <button id="btnDisconnect" disabled>Bağlantıyı Kes</button>
        </div>

        <!-- Seans Yönetim Kartı -->
        <div class="card">
            <h3>2. Aktif Seans Kontrolü</h3>
            <input type="text" id="seansAdi" value="Yeni Bölge Taraması">
            <select id="taramaModu">
                <option value="Hızlı Tarama">Hızlı Tarama</option>
                <option value="Derin Tarama">Derin Tarama</option>
            </select>
            <br><br>
            <button id="btnStartSession" disabled>Yeni Seans Başlat</button>
            <button id="btnEndSession" disabled>Seansı Bitir ve Kaydet</button>
            
            <div class="grid" id="scanGrid">
                <!-- Hücreler JavaScript ile dolacak -->
            </div>
        </div>

        <!-- Geçmiş Seanslar -->
        <div class="card">
            <h3>3. Geçmiş Seans Kayıtları</h3>
            <div id="seansLog">Henüz kayıtlı seans yok.</div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
